services:
  - type: web
    name: books-api
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    healthCheckPath: /
    envVars:
      - key: DB_HOST
        fromDatabase:
          name: books-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: books-db
          property: port
      - key: DB_NAME
        value: books_api
      - key: DB_USER
        fromDatabase:
          name: books-db
          property: username
      - key: DB_PASS
        fromDatabase:
          name: books-db
          property: password
      - key: DB_CHARSET
        value: utf8mb4
      - key: APP_DEBUG
        value: "true"
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_TTL
        value: "3600"
      - key: JWT_ISSUER
        value: books-api
      - key: CORS_ALLOWED_ORIGINS
        value: "*"
      - key: LOGIN_RATE_LIMIT
        value: "5"
      - key: LOGIN_WINDOW_SECONDS
        value: "60"

databases:
  - name: books-db
    plan: free
    databaseName: books_api
